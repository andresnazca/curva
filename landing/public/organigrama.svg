  <circle cx="602" cy="302" r="4" fill="#8b5cf6"/>
  <text x="612" y="306" font-family="Inter, system-ui, sans-serif" font-size="10.5" font-weight="600" fill="#0f172a">Finanzas</text>
  <text x="640" y="322" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b">Contador</text>
  <text x="640" y="338" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8.5" fill="#94a3b8">2 colaboradores</text>

  <rect x="658" y="280" width="124" height="70" rx="8" fill="white" filter="url(#shadow-sm)" stroke="#e2e8f0" stroke-width="1"/>
  <circle cx="682" cy="302" r="4" fill="#8b5cf6"/>
