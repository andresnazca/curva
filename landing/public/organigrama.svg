<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <filter id="shadow-sm" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" rx="16" fill="url(#bg)"/>

  <!-- Header -->
  <text x="400" y="38" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="2">ESTRUCTURA ORGANIZACIONAL</text>
  <line x1="340" y1="48" x2="460" y2="48" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Connection lines -->
  <!-- CEO to VPs -->
  <path d="M400 120 L400 150 L400 170" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4 3"/>
  <path d="M400 150 L160 150 L160 170" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4 3"/>
  <path d="M400 150 L640 150 L640 170" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- VP Ops to departments -->
  <path d="M160 240 L160 265 L160 280" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4 3"/>
  <path d="M160 265 L80 265 L80 280" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- VP Comercial to departments -->
  <path d="M400 240 L400 265 L400 280" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4 3"/>
  <path d="M400 265 L320 265 L320 280" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- VP Admin to departments -->
  <path d="M640 240 L640 265 L640 280" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4 3"/>
  <path d="M640 265 L720 265 L720 280" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- Teams lines -->
  <path d="M80 350 L80 375 L80 390" stroke="#e2e8f0" stroke-width="1"/>
  <path d="M160 350 L160 375 L160 390" stroke="#e2e8f0" stroke-width="1"/>
  <path d="M320 350 L320 375 L320 390" stroke="#e2e8f0" stroke-width="1"/>
  <path d="M400 350 L400 375 L400 390" stroke="#e2e8f0" stroke-width="1"/>
  <path d="M640 350 L640 375 L640 390" stroke="#e2e8f0" stroke-width="1"/>
  <path d="M720 350 L720 375 L720 390" stroke="#e2e8f0" stroke-width="1"/>

  <!-- CEO Card -->
  <rect x="310" y="62" width="180" height="58" rx="12" fill="url(#accent)" filter="url(#shadow)"/>
  <text x="400" y="87" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="white">Director General</text>
  <text x="400" y="106" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#93c5fd">CEO / Fundador</text>

