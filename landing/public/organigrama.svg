  <text x="160" y="200" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#0f172a">Dir. Operaciones</text>
  <text x="160" y="218" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748b">Procesos y produccion</text>
