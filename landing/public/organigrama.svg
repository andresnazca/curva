  <rect x="350" y="390" width="100" height="32" rx="6" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
  <text x="400" y="410" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8.5" font-weight="600" fill="#d97706">Community mgr</text>

  <rect x="590" y="390" width="100" height="32" rx="6" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="1"/>
  <text x="640" y="410" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8.5" font-weight="600" fill="#7c3aed">Contabilidad</text>

  <rect x="670" y="390" width="100" height="32" rx="6" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="1"/>
  <text x="720" y="410" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8.5" font-weight="600" fill="#7c3aed">Reclutamiento</text>

  <!-- Footer stats -->
  <line x1="60" y1="455" x2="740" y2="455" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="100" y="468" width="130" height="36" rx="8" fill="white" filter="url(#shadow-sm)" stroke="#e2e8f0" stroke-width="1"/>
  <text x="165" y="484" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="800" fill="#0f172a">27</text>
  <text x="165" y="498" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#94a3b8">COLABORADORES</text>

  <rect x="260" y="468" width="130" height="36" rx="8" fill="white" filter="url(#shadow-sm)" stroke="#e2e8f0" stroke-width="1"/>
  <text x="325" y="484" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="800" fill="#0f172a">3</text>
  <text x="325" y="498" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#94a3b8">DIRECCIONES</text>

  <rect x="420" y="468" width="130" height="36" rx="8" fill="white" filter="url(#shadow-sm)" stroke="#e2e8f0" stroke-width="1"/>
  <text x="485" y="484" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="800" fill="#0f172a">6</text>
  <text x="485" y="498" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#94a3b8">DEPARTAMENTOS</text>

  <rect x="580" y="468" width="130" height="36" rx="8" fill="white" filter="url(#shadow-sm)" stroke="#e2e8f0" stroke-width="1"/>
  <text x="645" y="484" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="800" fill="#2563eb">CURVA.</text>
  <text x="645" y="498" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#94a3b8">CONSULTORIA</text>
</svg>