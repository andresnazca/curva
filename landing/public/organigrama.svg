  <text x="640" y="218" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748b">Finanzas y talento</text>
  <text x="640" y="232" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#94a3b8">3 reportes directos</text>

