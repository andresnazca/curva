  <text x="720" y="322" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b">Coord. talento</text>
  <text x="720" y="338" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8.5" fill="#94a3b8">1 colaborador</text>

