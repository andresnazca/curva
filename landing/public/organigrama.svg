  <text x="52" y="306" font-family="Inter, system-ui, sans-serif" font-size="10.5" font-weight="600" fill="#0f172a">Produccion</text>
  <text x="80" y="322" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b">Coord. operativo</text>
  <text x="80" y="338" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8.5" fill="#94a3b8">8 colaboradores</text>

